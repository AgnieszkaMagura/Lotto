spring:
  main:
    allow-bean-definition-overriding: true
  data:
    mongodb:
            uri: mongodb://admin:admin@localhost:27017/lotto-web
    mvc:
      pathmatch:
        matching-strategy: ANT_PATH_MATCHER

lotto:
  result-checker:
    lotteryRunOccurrence: "*/5 * * * * *"
  number-generator:
    lotteryRunOccurrence: "*/7 * * * * *"
    facade:
      count: 25
      lowerBand: 1
      upperBand: 99
    http:
      client:
        config:
          uri: http://www.randomnumberapi.com
          port: 80
          connectionTimeout: 5000
          readTimeout: 5000
